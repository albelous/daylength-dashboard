<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Длительность светового дня</title>
  <style>
    /* Сокращённый CSS для примера */
    body { font-family: Arial, sans-serif; margin: 20px; }
    .layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
    @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }
    button { padding: 8px 12px; margin: 4px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; }
    button.active, button:hover { background: #333; color: white; }
    svg { width: 100%; height: 500px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>Длительность светового дня</h1>
  <div class="layout">
    <div>
      <div id="chartBox">
        <svg id="chart" viewBox="0 0 980 620"></svg>
      </div>
    </div>
    <div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button id="btnToday">Сегодня / 2 недели</button>
        <button id="btnWeek">Неделя</button>
        <button id="btnMonth">Месяц</button>
        <button id="btn3M">3 месяца</button>
      </div>
      <div style="margin-top:10px;">
        <label>Начало: <select id="startDate"></select></label>
        <label>Конец: <select id="endDate"></select></label>
      </div>
      <div id="legend"></div>
      <button id="btnPdf" style="margin-top:10px;">📄 PDF</button>
    </div>
  </div>
  <script>
    // Упрощённый JS для демонстрации
    document.getElementById('btnToday').onclick = () => alert('Кнопка работает!');
    document.getElementById('btnPdf').onclick = () => alert('PDF будет готов после библиотек');
  </script>
</body>
</html>
