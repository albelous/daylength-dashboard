<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Длительность светового дня</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #f7f7f7;
      --text: #1b1b1b;
      --muted: #666;
      --border: #cfcfcf;
      --grid: #e5e5e5;
      --m1: #111111;
      --m2: #444444;
      --m3: #777777;
      --m4: #999999;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: var(--text); background: var(--bg); }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 18px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .sub { color: var(--muted); margin-bottom: 14px; }
    .layout { display: grid; grid-template-columns: minmax(0,1fr) 340px; gap: 18px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .tool-btn { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; transition: .15s ease; }
    .tool-btn:hover { background: #f0f0f0; }
    .tool-btn.active { background: #1b1b1b; color: #fff; border-color: #1b1b1b; }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .control-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
    label { display: block; font-size: 14px; margin-bottom: 6px; color: #333; }
    select { width: 100%; padding: 9px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: white; }
    #chartBox { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
    svg { width: 100%; height: auto; display: block; }
    .legend { margin-top: 10px; display: grid; gap: 10px; }
    .legend-item { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
    .legend-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .swatch { width: 42px; height: 0; border-top-width: 3px; border-top-style: solid; }
    .city { font-weight: 700; }
    .meta { font-size: 14px; color: var(--muted); line-height: 1.35; }
    .note { margin-top: 10px; font-size: 13px; color: var(--muted); }
    @media print {
      body { background: white; }
      .wrap { max-width: none; padding: 0; }
      .panel, #chartBox, .legend-item { border-color: #888; }
      select { border-color: #888; }
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .wrap { padding: 10px; }
      h1 { font-size: 22px; }
      .sub { font-size: 13px; }
      .panel { padding: 10px; }
      .toolbar { gap: 6px; }
      .tool-btn { flex: 1 1 calc(50% - 6px); padding: 10px 8px; font-size: 13px; }
      .controls { grid-template-columns: 1fr; gap: 10px; }
      .control-card { padding: 8px; }
      label { font-size: 13px; }
      select { font-size: 13px; }
      .legend { gap: 8px; }
      .legend-item { padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Длительность светового дня</h1>
    <div class="sub">Москва, Петербург, Архангельск и Севастополь — 2024–2026</div>
    <div class="layout">
      <div class="panel">
        <div id="chartBox"><svg id="chart" viewBox="0 0 980 620" aria-label="Линейный график длительности светового дня"></svg></div>
      </div>
      <div class="panel">
        <div class="toolbar">
          <button type="button" class="tool-btn" id="btnToday">Сегодня / последние 2 недели</button>
          <button type="button" class="tool-btn" id="btnWeek">Неделя</button>
          <button type="button" class="tool-btn" id="btnMonth">Месяц</button>
          <button type="button" class="tool-btn" id="btn3M">3 месяца</button>
        </div>
        <div style="display:flex; justify-content:flex-end; margin: 0 0 10px;">
          <button type="button" id="btnPdf" style="padding:8px 12px;border:1px solid #cfcfcf;border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;">
            <span aria-hidden="true">📄</span><span>Экспорт в PDF</span>
          </button>
        </div>
        <div class="controls">
          <div class="control-card">
            <label for="startDate">Начало интервала</label>
            <select id="startDate"></select>
          </div>
          <div class="control-card">
            <label for="endDate">Конец интервала</label>
            <select id="endDate"></select>
          </div>
        </div>
        <div id="legend" class="legend"></div>
        <div class="note">Тестовый даш-борд, демонстратор технологии.</div>
      </div>
    </div>
  </div>
<script>
const styles = {
  moscow: { color:'#d32f2f', dash:'', width:3 },
  saint_petersburg: { color:'#1976d2', dash:'10 5', width:3 },
  arkhangelsk: { color:'#388e3c', dash:'3 4', width:3 },
  sevastopol: { color:'#7b1fa2', dash:'14 4 2 4', width:3 }
};

function fmtMinutes(mins, zeroHoursMinutesOnly=false) {
  const h = Math.floor(mins/60), m = mins%60;
  if (zeroHoursMinutesOnly && h === 0) return `${m} мин`;
  return `${h} ч ${String(m).padStart(2,'0')} мин`;
}
function fmtLat(c) { return `${c.lat_deg}° ${String(c.lat_min).padStart(2,'0')}′`; }
function parseISO(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); }
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/86400000); }
function fmtDateRu(s){ const d=parseISO(s); return d.toLocaleDateString('ru-RU'); }

fetch('./assets/daylength_data.json').then(r=>r.json()).then(data => {
  const allDates = [...new Set(data.records.map(r => r.date))];
  const startSel = document.getElementById('startDate');
  const endSel = document.getElementById('endDate');
  allDates.forEach(d => {
    const o1 = new Option(d, d); const o2 = new Option(d, d);
    startSel.add(o1); endSel.add(o2);
  });
  const lastAvailable = allDates[allDates.length - 1];
  const todayISO = new Date().toISOString().slice(0,10);
  const defaultEnd = allDates.includes(todayISO) ? todayISO : lastAvailable;
  const endDateObj = parseISO(defaultEnd);
  const startDateObj = new Date(endDateObj.getTime() - 13 * 86400000);
  const minDate = allDates[0];
  const defaultStart = allDates.find(d => d >= startDateObj.toISOString().slice(0,10)) || minDate;
  startSel.value = defaultStart;
  endSel.value = defaultEnd;

  const grouped = {};
  data.cities.forEach(c => grouped[c.id] = { city:c, records:[] });
  data.records.forEach(r => grouped[r.city_id].records.push(r));

  function render() {
    if (startSel.value > endSel.value) {
      if (event && event.target === startSel) endSel.value = startSel.value;
      else startSel.value = endSel.value;
    }
    const start = startSel.value, end = endSel.value;
    const totalDays = daysBetween(start, end) || 1;
    const filtered = data.cities.map(c => {
      const arr = grouped[c.id].records.filter(r => r.date >= start && r.date <= end);
      return { city:c, records:arr };
    });

    const svg = document.getElementById('chart');
    const W=980,H=620, ml=78,mr=24,mt=20,mb=64;
    const cw=W-ml-mr, ch=H-mt-mb;
    const minY=0, maxY=24*60;
    function xFor(i,n){ return ml + (n<=1?0:(i*(cw/(n-1)))); }
    function yFor(v){ return mt + ch - ((v-minY)/(maxY-minY))*ch; }

    const yTicks = [];
    for(let m=0;m<=1440;m+=120) yTicks.push(m);

    const xTickDates = [];
    const n = filtered[0].records.length;
    const steps = Math.min(8, Math.max(2,n));
    for(let i=0;i<steps;i++){
      const idx = Math.round(i*(n-1)/(steps-1||1));
      xTickDates.push({idx, date: filtered[0].records[idx]?.date});
    }

    let out = `
      <rect x="0" y="0" width="${W}" height="${H}" fill="white"/>
      <line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+ch}" stroke="#000" stroke-width="1"/>
      <line x1="${ml}" y1="${mt+ch}" x2="${ml+cw}" y2="${mt+ch}" stroke="#000" stroke-width="1"/>
    `;

    yTicks.forEach(t => {
      const y = yFor(t);
      out += `<line x1="${ml}" y1="${y}" x2="${ml+cw}" y2="${y}" stroke="#d9d9d9" stroke-width="1"/>`;
      out += `<text x="${ml-10}" y="${y+4}" text-anchor="end" font-size="12" font-family="Arial">${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}</text>`;
    });

    xTickDates.forEach(t => {
      if(!t.date) return;
      const x = xFor(t.idx, n);
      out += `<line x1="${x}" y1="${mt}" x2="${x}" y2="${mt+ch}" stroke="#eeeeee" stroke-width="1"/>`;
      out += `<text x="${x}" y="${mt+ch+24}" text-anchor="middle" font-size="12" font-family="Arial">${t.date}</text>`;
    });

    filtered.forEach(series => {
      const st = styles[series.city.id];
      const pts = series.records.map((r,i) => `${xFor(i,n)},${yFor(r.day_length_minutes)}`).join(' ');
      out += `<polyline fill="none" stroke="${st.color}" stroke-width="${st.width}" ${st.dash ? `stroke-dasharray="${st.dash}"` : ''} points="${pts}"/>`;
    });

    out += `<text x="${ml+cw/2}" y="${H-16}" text-anchor="middle" font-size="14" font-family="Arial">Дата</text>`;
    out += `<text x="18" y="${mt+ch/2}" transform="rotate(-90 18 ${mt+ch/2})" text-anchor="middle" font-size="14" font-family="Arial">Длительность светового дня (ч:мин)</text>`;
    svg.innerHTML = out;

    const legend = document.getElementById('legend');
    legend.innerHTML = filtered.map(series => {
      const first = series.records[0]?.day_length_minutes ?? 0;
      const last = series.records[series.records.length-1]?.day_length_minutes ?? 0;
      const diff = Math.abs(last-first);
      const sign = last>=first ? '+' : '−';
      const st = styles[series.city.id];
      return `
        <div class="legend-item">
          <div class="legend-top">
            <div class="swatch" style="border-top-color:${st.color}; ${st.dash ? `border-top-style:dashed;` : `border-top-style:solid;`} background:none"></div>
            <div class="city">${series.city.name}</div>
          </div>
          <div class="meta">Широта: ${fmtLat(series.city)}</div>
          <div class="meta">Изменение за интервал: ${sign}${fmtMinutes(diff, true)}</div>
          <div class="meta">Период: ${fmtDateRu(start)} — ${fmtDateRu(end)}</div>
        </div>`;
    }).join('');
  }

  function setActive(btnId) {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(btnId);
    if (btn) btn.classList.add('active');
  }

  function setRange(daysBack, btnId) {
    const end = endSel.value;
    const endIdx = allDates.indexOf(end);
    const startIdx = Math.max(0, endIdx - daysBack + 1);
    startSel.value = allDates[startIdx];
    setActive(btnId);
    render();
  }

  function pad2(n){ return String(n).padStart(2,'0'); }
  function fileStamp(d){ return `${String(d.getFullYear()).slice(-2)}${pad2(d.getMonth()+1)}${pad2(d.getDate())}${pad2(d.getHours())}${pad2(d.getMinutes())}${pad2(d.getSeconds())}`; }
  function loadScript(src){ return new Promise((res, rej) => { const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }
  async function exportPdf(){
    const box = document.getElementById('chartBox');
    const oldStyle = box.style.width;
    box.style.width = box.getBoundingClientRect().width + 'px';
    if (!window.html2canvas) await loadScript('https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js');
    if (!window.jspdf || !window.jspdf.jsPDF) await loadScript('https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js');
    const canvas = await html2canvas(box, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    const img = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l', 'pt', 'a4');
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    const margin = 24;
    const ratio = Math.min((pw - margin * 2) / canvas.width, (ph - margin * 2) / canvas.height);
    const w = canvas.width * ratio;
    const h = canvas.height * ratio;
    const x = (pw - w) / 2;
    const y = (ph - h) / 2;
    pdf.addImage(img, 'PNG', x, y, w, h);
    pdf.save(`${fileStamp(new Date())}.pdf`);
    box.style.width = oldStyle;
  }

  document.getElementById('btnToday').addEventListener('click', () => {
    const end = allDates.includes(new Date().toISOString().slice(0,10)) ? new Date().toISOString().slice(0,10) : allDates[allDates.length - 1];
    endSel.value = end;
    setRange(14, 'btnToday');
  });
  document.getElementById('btnWeek').addEventListener('click', () => setRange(7, 'btnWeek'));
  document.getElementById('btnMonth').addEventListener('click', () => setRange(30, 'btnMonth'));
  document.getElementById('btn3M').addEventListener('click', () => setRange(90, 'btn3M'));
  document.getElementById('btnPdf').addEventListener('click', exportPdf);

  startSel.addEventListener('change', () => { setActive(''); render(); });
  endSel.addEventListener('change', () => { setActive(''); render(); });
  setActive('btnToday');
  render();
});
</script>
</body>
</html>
